                        },
                        "query": "import \"timezone\"\nimport \"date\"\noption location = timezone.location(name: \"Europe/Berlin\")\n\ntoday = date.truncate(t: now(), unit: 1d)\nstart_time = date.add(d: -14d, to: today)\n\noverall = from(bucket: \"default\")\n  |> range(start: start_time)\n  |> filter(fn: (r) => r._measurement == \"em:0\" and r._field =~ /^[a-c]_act_power$/)\n  |> map(fn: (r) => ({\n    r with\n    phase: if r._field == \"a_act_power\" then \"A\"\n           else if r._field == \"b_act_power\" then \"B\"\n           else \"C\"\n  }))\n  |> group(columns: [\"phase\"])\n  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)\n  |> fill(usePrevious: true)\n  |> group(columns: [\"phase\", \"_start\", \"_stop\"])\n  |> aggregateWindow(every: 1d, fn: (column, tables=<-) => tables |> sort(columns: [\"_time\"]) |> integral(unit: 1h), timeSrc: \"_start\")\n  |> keep(columns: [\"_time\", \"phase\", \"_value\"])\n\nwallbox = from(bucket: \"default\")\n  |> range(start: start_time)\n  |> filter(fn: (r) => r._measurement == \"power\" and r.wallbox_name == \"22hg\" and r._field == \"power\")\n  |> group()\n  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)\n  |> fill(usePrevious: true)\n  |> group(columns: [\"_start\", \"_stop\"])\n  |> aggregateWindow(every: 1d, fn: (column, tables=<-) => tables |> sort(columns: [\"_time\"]) |> integral(unit: 1h), timeSrc: \"_start\")\n\nwallbox_A = wallbox |> map(fn: (r) => ({ r with phase: \"A\", _value: r._value / 3.0 }))\nwallbox_B = wallbox |> map(fn: (r) => ({ r with phase: \"B\", _value: r._value / 3.0 }))\nwallbox_C = wallbox |> map(fn: (r) => ({ r with phase: \"C\", _value: r._value / 3.0 }))\n\nwallbox_phases = union(tables: [wallbox_A, wallbox_B, wallbox_C])\n\noverall_tagged = overall |> map(fn: (r) => ({ r with _field: \"overall\" }))\nwallbox_tagged = wallbox_phases |> map(fn: (r) => ({ r with _field: \"wallbox\" }))\n\nunion(tables: [overall_tagged, wallbox_tagged])\n  |> group(columns: [\"phase\"])\n  |> pivot(rowKey: [\"_time\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> map(fn: (r) => ({\n    r with\n    _value: ((if exists r.overall then r.overall else 0.0) - (if exists r.wallbox then r.wallbox else 0.0)) / 1000.0 * 0.2727,\n    _field: \"Phase \" + r.phase\n  }))\n  |> group(columns: [\"_field\"])\n  |> keep(columns: [\"_time\", \"_value\", \"_field\"])",
